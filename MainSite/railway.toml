[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/start.sh"
healthcheckPath = "/php/index.php"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

# Attach ONE Railway volume to this service:
#   Mount path: /var/www/site/persist
# Do NOT mount only /public/gallery — travels.json lives in /persist/data/.
# Railway sets RAILWAY_VOLUME_MOUNT_PATH automatically.
